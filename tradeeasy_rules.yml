groups:
  - name: tradeeasy_ingestion_alerts
    rules:
      - alert: HighIngestionErrorRate
        expr: rate(tradeeasy_ingestion_errors_total[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
          service: tradeeasy-backend
        annotations:
          summary: "High ingestion error rate detected"
          description: "TradeEasy ingestion error rate is {{ $value }} errors/sec over the last 5 minutes"

      - alert: IngestionStoppedWorking
        expr: increase(tradeeasy_ingestion_feeds_total[30m]) == 0
        for: 5m
        labels:
          severity: critical
          service: tradeeasy-backend
        annotations:
          summary: "RSS ingestion has stopped working"
          description: "No RSS feeds have been processed in the last 30 minutes"

      - alert: DatabaseOperationSlowdown
        expr: histogram_quantile(0.95, rate(tradeeasy_database_operation_duration_seconds_bucket[5m])) > 1.0
        for: 3m
        labels:
          severity: warning
          service: tradeeasy-backend
        annotations:
          summary: "Database operations are slow"
          description: "95th percentile database operation time is {{ $value }}s"

  - name: tradeeasy_api_alerts
    rules:
      - alert: APIHighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="tradeeasy-api"}[5m])) > 2.0
        for: 2m
        labels:
          severity: warning
          service: tradeeasy-api
        annotations:
          summary: "API response time is high"
          description: "95th percentile API response time is {{ $value }}s"

      - alert: APIHighErrorRate
        expr: rate(http_requests_total{job="tradeeasy-api",status=~"5.."}[5m]) / rate(http_requests_total{job="tradeeasy-api"}[5m]) > 0.05
        for: 1m
        labels:
          severity: critical
          service: tradeeasy-api
        annotations:
          summary: "High API error rate"
          description: "API error rate is {{ $value | humanizePercentage }} over the last 5 minutes"

  - name: tradeeasy_system_alerts
    rules:
      - alert: TradeEasyServiceDown
        expr: up{job=~"tradeeasy.*"} == 0
        for: 30s
        labels:
          severity: critical
          service: tradeeasy-backend
        annotations:
          summary: "TradeEasy service is down"
          description: "TradeEasy {{ $labels.job }} service has been down for more than 30 seconds"

      - alert: LowArticleIngestionRate
        expr: rate(tradeeasy_ingestion_articles_created_total[10m]) < 0.1
        for: 5m
        labels:
          severity: warning
          service: tradeeasy-backend
        annotations:
          summary: "Low article ingestion rate"
          description: "Article creation rate is {{ $value }} articles/sec, which is below normal" 