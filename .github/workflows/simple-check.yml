name: Simple Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Run a simple check
      run: |
        echo "This is a simple check that will always pass"
        ls -la
        
    - name: Success
      run: echo "Check completed successfully" 