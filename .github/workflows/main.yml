name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
        
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
    - name: Check formatting with black
      run: |
        black --check app tests
        
    - name: Check imports with isort
      run: |
        isort --check --profile black app tests
        
    - name: Type check with mypy
      run: |
        mypy app

  test:
    needs: lint
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: tradeeasy
          POSTGRES_PASSWORD: tradeeasy
          POSTGRES_DB: tradeeasy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
        python -m nltk.downloader punkt
        
    - name: Run tests with pytest
      env:
        DATABASE_URL: postgresql://tradeeasy:tradeeasy@localhost:5432/tradeeasy_test
        TESTING: true
      run: |
        pytest --cov=app --cov-report=xml
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  build:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        load: true
        tags: tradeeasy-backend:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Test Docker image
      run: |
        docker run --name tradeeasy-test -d \
          -e DATABASE_URL=sqlite:///tradeeasy.db \
          -e TESTING=true \
          tradeeasy-backend:test
        
        # Give the container time to start up
        sleep 5
        
        # Check if the container is running
        docker ps | grep tradeeasy-test
        
        # Check the health endpoint
        docker exec tradeeasy-test curl -s http://localhost:8000/health | grep -q "ok"
        
        # Clean up
        docker stop tradeeasy-test
        docker rm tradeeasy-test 