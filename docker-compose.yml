version: '3.8'

services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://tradeeasy:tradeeasy@db:5432/tradeeasy
      - RSS_SOURCES=https://www.investing.com/rss/news_25.rss,https://www.cnbc.com/id/10000664/device/rss/rss.html,https://www.reuters.com/rssfeed/businessNews
      - LOG_LEVEL=INFO
      - SECRET_KEY=developmentsecretkey # Change in production
    volumes:
      - ./app:/app/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - tradeeasy-network

  db:
    image: postgres:14-alpine
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=tradeeasy
      - POSTGRES_PASSWORD=tradeeasy
      - POSTGRES_DB=tradeeasy
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradeeasy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tradeeasy-network

volumes:
  postgres-data:

networks:
  tradeeasy-network:
    driver: bridge
