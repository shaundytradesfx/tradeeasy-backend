global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "tradeeasy_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - localhost:9093

scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape TradeEasy backend metrics from dedicated metrics server
  - job_name: 'tradeeasy-metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['localhost:8001']
    metrics_path: /
    scheme: http

  # Scrape TradeEasy backend API metrics endpoint
  - job_name: 'tradeeasy-api'
    scrape_interval: 15s
    static_configs:
      - targets: ['localhost:8000']
    metrics_path: /metrics
    scheme: http

  # Scrape TradeEasy backend health and status
  - job_name: 'tradeeasy-health'
    scrape_interval: 30s
    static_configs:
      - targets: ['localhost:8000']
    metrics_path: /health
    scheme: http 